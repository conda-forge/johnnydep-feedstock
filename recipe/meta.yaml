{% set name = "johnnydep" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/johnnydep-{{ version }}.tar.gz
  sha256: 54f05293767aac2d5496f273299bb8d76529f737ba73a6123a65cb52846061ca

build:
  entry_points:
    - johnnydep = johnnydep.cli:main
    - pipper = johnnydep.pipper:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - loguru
    - pyyaml
    - rich
    - tomli-w
    - unearth
    - uv
    - importlib-metadata
    - anytree
    - cachetools
    - colorama
    - distlib
    - oyaml
    - packaging >=17,!=22
    - pip
    - pkginfo >=1.4.2
    - python >=3.6
    - setuptools >=38.3
    - structlog
    - tabulate
    - toml
    - wheel >=0.32.0
    - wimpy

test:
  imports:
    - johnnydep
  commands:
    - pip check
    - johnnydep --help
    - pipper --help
  requires:
    - pip

about:
  home: https://github.com/wimglenn/johnnydep
  summary: Display dependency tree of Python distribution
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ickc
